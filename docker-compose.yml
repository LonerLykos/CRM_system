services:
  crm:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8000"
    command: >
      sh -c "python manage.py wait_db && python manage.py migrate --noinput && exec python manage.py runserver 0.0.0.0:8000"
    networks:
      - app_network

  web:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./client:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

